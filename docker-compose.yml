services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hours_user
      POSTGRES_PASSWORD: hours_pass
      POSTGRES_DB: hours_tracker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hours_user -d hours_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: ../backend.Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://hours_user:hours_pass@postgres:5432/hours_tracker
      ENV: ${ENV:-dev}
      CORS_ORIGINS: "http://localhost:8080,http://localhost:3000"
      SQL_ECHO: "false"
      UPLOAD_DIR: /app/uploads
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-use-a-long-random-string}
    volumes:
      - uploads:/app/uploads
      - ./assets:/app/assets:ro

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
