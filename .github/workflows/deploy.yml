# =============================================================================
# H_Tracker — CI/CD Pipeline
# Trigger  : push to main
# Auth     : GitHub OIDC → Azure Workload Identity Federation (no secrets)
# =============================================================================
#
# Required GitHub repository secrets:
#   AZURE_CLIENT_ID       — App Registration / Managed Identity client ID
#   AZURE_TENANT_ID       — Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   DB_PASSWORD           — PostgreSQL admin password (passed to Bicep)
#   JWT_SECRET_KEY        — FastAPI JWT signing key (passed to Bicep)
#   ADMIN_PASSWORD        — Initial admin account password (passed to Bicep)
#
# The backend URL is injected into the frontend at RUNTIME (via /config.js from
# the BACKEND_URL env var), not baked in at build time — so a single deploy is
# always correct, even on the very first run. No rebuild/second push needed.
# =============================================================================

name: Build, Push & Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  id-token: write           # Required for OIDC token acquisition
  contents: read

env:
  RESOURCE_GROUP: impactpoint-hours-rg
  ACR_NAME: impactpointhoursacr
  ACR_LOGIN_SERVER: impactpointhoursacr.azurecr.io
  BACKEND_APP: impactpoint-hours-backend
  FRONTEND_APP: impactpoint-hours-frontend
  INVOICE_JOB: impactpoint-hours-invoice-job

# =============================================================================
# Job 1 — Build Docker images and push to ACR
# =============================================================================
jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # OIDC login to Azure — no password secrets required
      # -----------------------------------------------------------------------
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # Login to ACR using the Azure CLI token obtained via OIDC above.
      # This avoids storing ACR credentials as secrets.
      # -----------------------------------------------------------------------
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      # -----------------------------------------------------------------------
      # Build & push BACKEND image
      # Context: ./Backend  |  Dockerfile: backend.Dockerfile (at repo root)
      # -----------------------------------------------------------------------
      - name: Build and push backend image
        run: |
          docker build \
            --file backend.Dockerfile \
            --tag ${{ env.ACR_LOGIN_SERVER }}/backend:latest \
            --tag ${{ env.ACR_LOGIN_SERVER }}/backend:${{ github.sha }} \
            ./Backend
          docker push ${{ env.ACR_LOGIN_SERVER }}/backend:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      # -----------------------------------------------------------------------
      # Build & push FRONTEND image
      # No build args: the backend URL is injected at runtime via /config.js
      # (BACKEND_URL env var), so the image is backend-agnostic.
      # -----------------------------------------------------------------------
      - name: Build and push frontend image
        run: |
          docker build \
            --file frontend.Dockerfile \
            --tag ${{ env.ACR_LOGIN_SERVER }}/frontend:latest \
            --tag ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }} \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}

# =============================================================================
# Job 2 — Deploy infrastructure (Bicep) and update Container App images
# =============================================================================
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production    # Optional: require manual approval in GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # Deploy Bicep — idempotent, safe to re-run on every push.
      # Secure params are passed inline and never written to disk.
      # -----------------------------------------------------------------------
      - name: Deploy Bicep infrastructure
        id: bicep
        env:
          # A .bicepparam file must assign every required parameter, so the secure
          # params are read from these env vars via readEnvironmentVariable() in
          # main.bicepparam (mixing bicepparam + inline --parameters fails BCP258).
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          # Optional — invitation emails via Microsoft Graph. Empty if unset;
          # email stays disabled and the deploy still succeeds.
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
        run: |
          set -o pipefail   # otherwise `| tee` masks an az failure as success
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --parameters infra/main.bicepparam \
            --name "deploy-${{ github.sha }}" \
            --output json \
          | tee /tmp/bicep-output.json

          # Parse outputs for downstream steps
          BACKEND_URL=$(jq -r '.properties.outputs.backendUrl.value' /tmp/bicep-output.json)
          FRONTEND_URL=$(jq -r '.properties.outputs.frontendUrl.value' /tmp/bicep-output.json)
          BACKEND_FQDN=$(jq -r '.properties.outputs.backendFqdn.value' /tmp/bicep-output.json)
          FRONTEND_FQDN=$(jq -r '.properties.outputs.frontendFqdn.value' /tmp/bicep-output.json)

          echo "backend-url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"
          echo "frontend-url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"
          echo "backend-fqdn=${BACKEND_FQDN}" >> "$GITHUB_OUTPUT"
          echo "frontend-fqdn=${FRONTEND_FQDN}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Update CORS_ORIGINS on the backend now that the frontend FQDN is known.
      # Container Apps supports updating individual env vars without full redeploy.
      # -----------------------------------------------------------------------
      - name: Update backend CORS_ORIGINS
        run: |
          # Retry: `az containerapp` calls occasionally hit transient network
          # resets (ConnectionResetError) mid-operation; a flake shouldn't fail
          # the whole deploy.
          retry() {
            local n=1 max=4 delay=15
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "FAILED after $n attempts: $*"; return 1; fi
              echo "Attempt $n failed; retrying in ${delay}s..."; sleep "$delay"
              n=$((n+1)); delay=$((delay*2))
            done
          }
          FRONTEND_FQDN="${{ steps.bicep.outputs.frontend-fqdn }}"
          retry az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "CORS_ORIGINS=https://${FRONTEND_FQDN}" "FRONTEND_URL=https://${FRONTEND_FQDN}"

      # -----------------------------------------------------------------------
      # Update backend image to the SHA-tagged version built in job 1.
      # This triggers a rolling restart — zero downtime (minReplicas=1).
      # -----------------------------------------------------------------------
      - name: Update backend Container App image
        run: |
          retry() {
            local n=1 max=4 delay=15
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "FAILED after $n attempts: $*"; return 1; fi
              echo "Attempt $n failed; retrying in ${delay}s..."; sleep "$delay"
              n=$((n+1)); delay=$((delay*2))
            done
          }
          retry az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/backend:${{ needs.build-and-push.outputs.image-tag }}

      # -----------------------------------------------------------------------
      # Update frontend image to the SHA-tagged version.
      # -----------------------------------------------------------------------
      - name: Update frontend Container App image
        run: |
          retry() {
            local n=1 max=4 delay=15
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "FAILED after $n attempts: $*"; return 1; fi
              echo "Attempt $n failed; retrying in ${delay}s..."; sleep "$delay"
              n=$((n+1)); delay=$((delay*2))
            done
          }
          retry az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ needs.build-and-push.outputs.image-tag }}

      # -----------------------------------------------------------------------
      # Update the scheduled invoice Job to the SHA-tagged image so the nightly
      # run uses the same build as the web app (Bicep pins it to :latest).
      # -----------------------------------------------------------------------
      - name: Update invoice Job image
        run: |
          retry() {
            local n=1 max=4 delay=15
            until "$@"; do
              if [ "$n" -ge "$max" ]; then echo "FAILED after $n attempts: $*"; return 1; fi
              echo "Attempt $n failed; retrying in ${delay}s..."; sleep "$delay"
              n=$((n+1)); delay=$((delay*2))
            done
          }
          retry az containerapp job update \
            --name ${{ env.INVOICE_JOB }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/backend:${{ needs.build-and-push.outputs.image-tag }}

      # -----------------------------------------------------------------------
      # Print deployed URLs for visibility in the Actions run summary
      # -----------------------------------------------------------------------
      - name: Print deployment URLs
        run: |
          echo "### Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service  | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | ${{ steps.bicep.outputs.frontend-url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend  | ${{ steps.bicep.outputs.backend-url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
