server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy — used ONLY for local / same-origin deployments
    # (docker-compose), where the backend is reachable as the `backend` service.
    # In Azure the SPA calls the backend's absolute URL (window.__ENV__.API_URL,
    # injected into /config.js at startup) and this block is never hit.
    #
    # The upstream is a VARIABLE + resolver so DNS is resolved lazily at request
    # time instead of at config load. This keeps nginx from crashing at startup
    # when `backend` does not resolve (e.g. Azure Container Apps). 127.0.0.11 is
    # Docker's embedded DNS, used only when the block is actually exercised locally.
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $api_backend "backend";
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Rewrite Location headers from backend 307 redirects to restore /api/ prefix
        proxy_redirect ~^(https?://[^/]+)/(.*)$ $1/api/$2;
    }

    # Never cache the runtime config so a redeploy's new backend URL is picked up.
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Never cache index.html so browsers always get fresh chunk references after deploys
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
